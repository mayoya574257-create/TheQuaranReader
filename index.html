
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Al-Noor Quran Reader | Multiple Reciters</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Amiri', 'Traditional Arabic', 'Tahoma', system-ui, -apple-system, BlinkMacSystemFont, 'Roboto', sans-serif;
        }

        body {
            background: linear-gradient(145deg, #0b2f9e 0%, #1a4fc3 40%, #3a7bd5 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem 1rem;
        }

        .quran-card {
            max-width: 1000px;
            width: 100%;
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(3px);
            border-radius: 48px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.2), 0 0 0 1px rgba(255, 255, 255, 0.3) inset;
            overflow: hidden;
        }

        .header {
            background: #0a2472;
            padding: 1.5rem 2rem;
            text-align: center;
            border-bottom: 3px solid #ffd966;
        }

        .header h1 {
            color: #f9f3d9;
            font-size: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .badge {
            background: #ffcd4a;
            color: #0a2472;
            font-size: 0.8rem;
            font-weight: bold;
            border-radius: 40px;
            padding: 0.25rem 1rem;
            display: inline-block;
            margin-top: 10px;
        }

        .content {
            padding: 2rem;
        }

        .action-panel {
            background: #eef3ff;
            border-radius: 40px;
            padding: 1.2rem;
            margin-bottom: 2rem;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            box-shadow: 0 5px 12px rgba(0, 0, 0, 0.05);
        }

        .btn-primary {
            background: linear-gradient(95deg, #1e4dd4, #0e3490);
            border: none;
            color: white;
            font-weight: bold;
            font-size: 1.2rem;
            padding: 0.8rem 2rem;
            border-radius: 60px;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 6px 0 #071b4f;
            transform: translateY(-2px);
        }

        .btn-primary:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #071b4f;
        }

        .reciter-selector {
            display: flex;
            align-items: center;
            gap: 12px;
            background: white;
            padding: 0.3rem 1rem;
            border-radius: 60px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        .reciter-selector label {
            font-weight: bold;
            color: #0a2472;
        }

        select {
            padding: 0.4rem 1rem;
            border-radius: 40px;
            border: 1px solid #cbd5e1;
            background: #f8fafc;
            font-weight: 500;
            cursor: pointer;
        }

        .listen-btn {
            background: #0a6b5e;
            border: none;
            color: white;
            font-weight: bold;
            padding: 10px 24px;
            border-radius: 60px;
            margin-top: 20px;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 3px 8px rgba(0,0,0,0.2);
        }

        .listen-btn:hover {
            background: #0e8a78;
            transform: scale(1.02);
        }

        .verses-container {
            background: #fefcf0;
            border-radius: 36px;
            padding: 1.8rem;
            margin: 1.5rem 0;
            box-shadow: 0 12px 25px rgba(0, 0, 0, 0.1);
            border: 1px solid #ffecb3;
        }

        .verse-item {
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px dashed #cbd5e1;
        }

        .verse-item:last-child {
            border-bottom: none;
        }

        .arabic {
            font-size: 1.9rem;
            line-height: 1.5;
            font-weight: 500;
            text-align: right;
            font-family: 'Amiri', 'Traditional Arabic', 'Times New Roman', serif;
            color: #1e2f4b;
            margin-bottom: 0.5rem;
        }

        .translation {
            font-size: 1rem;
            color: #2d496c;
            background: #f0f4fa;
            padding: 0.5rem 1rem;
            border-radius: 24px;
            margin-top: 0.3rem;
            border-left: 5px solid #0a2472;
        }

        .loading {
            text-align: center;
            padding: 2rem;
            color: #0b2f9e;
            font-weight: bold;
        }

        footer {
            text-align: center;
            padding: 1rem;
            font-size: 0.75rem;
            background: #dce5f5;
            color: #1f3a6b;
        }

        @media (max-width: 680px) {
            .arabic { font-size: 1.4rem; }
            .btn-primary { padding: 0.6rem 1.4rem; font-size: 1rem; }
            .content { padding: 1.5rem; }
            .reciter-selector { padding: 0.3rem 0.8rem; }
            select { font-size: 0.8rem; }
        }
    </style>
</head>
<body>
<div class="quran-card">
    <div class="header">
        <h1>
            <span>📖</span> Al-Noor Quran Reader
        </h1>
        <div class="badge">🎧 Multiple Reciters | Juz 1–29</div>
    </div>
    <div class="content">
        <div class="action-panel">
            <button class="btn-primary" id="readVersesBtn">✨ Read 3 Verses ✨</button>
        </div>

        <div id="versesDisplay" style="display: none;">
            <div class="verses-container" id="versesList"></div>
            <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px;">
                <div class="reciter-selector">
                    <label>🎙️ Reciter:</label>
                    <select id="reciterSelect">
                        <option value="alafasy">Mashari Rashed Alafasy</option>
                        <option value="alajmi">Ahmed Al-Ajmi</option>
                        <option value="dosari">Yasser Al-Dosari</option>
                    </select>
                </div>
                <button class="listen-btn" id="listenBtn">🎧 Listen to Verses</button>
            </div>
        </div>
        <div id="loadingMessage" class="loading" style="display: none;">📖 Loading verses...</div>
    </div>
    <footer>🕊️ Consecutive verses from Juz 1 to 29 | Each read is unique</footer>
</div>

<script>
    // -----------------------------------------------
    // QURAN DATASET (Juz 1–29)
    // -----------------------------------------------
    const AYAH_COUNTS = [
        7, 286, 200, 176, 120, 165, 206, 75, 129, 109, 123, 111, 43, 52, 99, 128, 111, 110, 98, 135, 112, 78, 118, 64, 77,
        227, 93, 88, 69, 60, 34, 30, 73, 54, 45, 83, 182, 88, 75, 85, 54, 53, 89, 59, 37, 35, 38, 29, 18, 45, 60, 49, 62,
        55, 78, 96, 29, 22, 24, 13, 14, 11, 11, 18, 12, 12, 30, 52, 52, 44, 28, 28, 20, 56, 40, 31, 50, 40, 46, 42, 29,
        19, 36, 25, 22, 17, 19, 26, 30, 20, 15, 21, 11, 8, 8, 19, 5, 8, 8, 11, 11, 8, 3, 9, 5, 4, 7, 3, 6, 3, 5, 4, 5, 6
    ];
    
    const JUZ_BOUNDARIES = [
        { startSurah: 1, startAyah: 1, endSurah: 2, endAyah: 141 },
        { startSurah: 2, startAyah: 142, endSurah: 2, endAyah: 252 },
        { startSurah: 2, startAyah: 253, endSurah: 3, endAyah: 92 },
        { startSurah: 3, startAyah: 93, endSurah: 4, endAyah: 23 },
        { startSurah: 4, startAyah: 24, endSurah: 4, endAyah: 147 },
        { startSurah: 4, startAyah: 148, endSurah: 5, endAyah: 81 },
        { startSurah: 5, startAyah: 82, endSurah: 6, endAyah: 110 },
        { startSurah: 6, startAyah: 111, endSurah: 7, endAyah: 87 },
        { startSurah: 7, startAyah: 88, endSurah: 8, endAyah: 40 },
        { startSurah: 8, startAyah: 41, endSurah: 9, endAyah: 92 },
        { startSurah: 9, startAyah: 93, endSurah: 11, endAyah: 5 },
        { startSurah: 11, startAyah: 6, endSurah: 12, endAyah: 52 },
        { startSurah: 12, startAyah: 53, endSurah: 14, endAyah: 52 },
        { startSurah: 15, startAyah: 1, endSurah: 16, endAyah: 128 },
        { startSurah: 17, startAyah: 1, endSurah: 18, endAyah: 74 },
        { startSurah: 18, startAyah: 75, endSurah: 20, endAyah: 135 },
        { startSurah: 21, startAyah: 1, endSurah: 22, endAyah: 78 },
        { startSurah: 23, startAyah: 1, endSurah: 25, endAyah: 20 },
        { startSurah: 25, startAyah: 21, endSurah: 27, endAyah: 55 },
        { startSurah: 27, startAyah: 56, endSurah: 29, endAyah: 45 },
        { startSurah: 29, startAyah: 46, endSurah: 33, endAyah: 30 },
        { startSurah: 33, startAyah: 31, endSurah: 36, endAyah: 27 },
        { startSurah: 36, startAyah: 28, endSurah: 39, endAyah: 31 },
        { startSurah: 39, startAyah: 32, endSurah: 41, endAyah: 46 },
        { startSurah: 41, startAyah: 47, endSurah: 45, endAyah: 37 },
        { startSurah: 46, startAyah: 1, endSurah: 51, endAyah: 30 },
        { startSurah: 51, startAyah: 31, endSurah: 57, endAyah: 29 },
        { startSurah: 58, startAyah: 1, endSurah: 66, endAyah: 12 },
        { startSurah: 67, startAyah: 1, endSurah: 77, endAyah: 50 }
    ];
    
    function buildVersesListForJuz1To29() {
        let allVerses = [];
        for (let j = 0; j < JUZ_BOUNDARIES.length; j++) {
            const boundary = JUZ_BOUNDARIES[j];
            for (let surah = boundary.startSurah; surah <= boundary.endSurah; surah++) {
                const maxAyah = AYAH_COUNTS[surah-1];
                let startAyah = (surah === boundary.startSurah) ? boundary.startAyah : 1;
                let endAyah = (surah === boundary.endSurah) ? boundary.endAyah : maxAyah;
                for (let ayah = startAyah; ayah <= endAyah; ayah++) {
                    allVerses.push({ surah, ayah, juz: j+1 });
                }
            }
        }
        return allVerses;
    }
    
    const MASTER_VERSES = buildVersesListForJuz1To29();
    console.log(`Loaded ${MASTER_VERSES.length} verses from Juz 1-29`);
    
    function isValidTriplet(startIdx) {
        if (startIdx + 2 >= MASTER_VERSES.length) return false;
        const surah1 = MASTER_VERSES[startIdx].surah;
        const surah2 = MASTER_VERSES[startIdx+1].surah;
        const surah3 = MASTER_VERSES[startIdx+2].surah;
        return (surah1 === surah2 && surah2 === surah3);
    }
    
    function getRandomConsecutiveTriplet() {
        let maxAttempts = 100;
        let randomStart;
        do {
            randomStart = Math.floor(Math.random() * (MASTER_VERSES.length - 2));
            maxAttempts--;
            if (maxAttempts <= 0) break;
        } while (!isValidTriplet(randomStart));
        if (!isValidTriplet(randomStart)) {
            for (let i = 0; i < MASTER_VERSES.length - 2; i++) {
                if (isValidTriplet(i)) {
                    randomStart = i;
                    break;
                }
            }
        }
        return [
            MASTER_VERSES[randomStart],
            MASTER_VERSES[randomStart+1],
            MASTER_VERSES[randomStart+2]
        ];
    }
    
    // Fetch Arabic + English
    async function fetchVerseText(surah, ayah) {
        const url = `https://api.alquran.cloud/v1/ayah/${surah}:${ayah}/editions/quran-uthmani,en.sahih`;
        try {
            const response = await fetch(url);
            const data = await response.json();
            if (data.code === 200 && data.data.length >= 2) {
                return { arabic: data.data[0].text, english: data.data[1].text };
            } else {
                throw new Error("API error");
            }
        } catch (err) {
            console.warn("fetch error, fallback text", err);
            return { arabic: `[${surah}:${ayah}]`, english: "Translation temporarily unavailable" };
        }
    }
    
    async function displayTripletVerses(versesArray) {
        const versesContainer = document.getElementById("versesList");
        versesContainer.innerHTML = '<div class="loading">📖 Loading revelation...</div>';
        let finalHtml = '';
        for (let i = 0; i < versesArray.length; i++) {
            const v = versesArray[i];
            const texts = await fetchVerseText(v.surah, v.ayah);
            finalHtml += `
                <div class="verse-item">
                    <div class="arabic">${texts.arabic}</div>
                    <div class="translation">✨ ${texts.english}</div>
                    <div style="font-size:0.75rem; color:#4f6f8f; margin-top:5px;">${v.surah}:${v.ayah} • Juz ${v.juz}</div>
                </div>
            `;
        }
        versesContainer.innerHTML = finalHtml;
        window.currentDisplayedVerses = versesArray;
    }
    
    // -----------------------------------------------
    // AUDIO: Reliable sources for all reciters
    // -----------------------------------------------
    let audioElement = null;
    let audioQueue = [];
    let audioIndex = 0;
    let currentRetry = 0;
    
    function formatSurahAyah(surah, ayah) {
        return {
            surah3: surah.toString().padStart(3, '0'),
            ayah3: ayah.toString().padStart(3, '0')
        };
    }
    
    // Define reciter URL patterns
    const RECITERS = {
        alafasy: {
            name: "Mashari Rashed Alafasy",
            primary: (surah, ayah) => {
                const { surah3, ayah3 } = formatSurahAyah(surah, ayah);
                return `https://everyayah.com/data/Alafasy_128kbps/${surah3}${ayah3}.mp3`;
            },
            fallback: (surah, ayah) => {
                const { surah3, ayah3 } = formatSurahAyah(surah, ayah);
                return `https://cdn.islamic.network/quran/audio/128/ar.alafasy/${surah3}${ayah3}.mp3`;
            }
        },
        alajmi: {
            name: "Ahmed Al-Ajmi",
            primary: (surah, ayah) => {
                const { surah3, ayah3 } = formatSurahAyah(surah, ayah);
                return `https://everyayah.com/data/Ahmed_AlAjmi_128kbps/${surah3}${ayah3}.mp3`;
            },
            fallback: (surah, ayah) => {
                const { surah3, ayah3 } = formatSurahAyah(surah, ayah);
                return `https://server7.mp3quran.net/alajmi/${surah3}${ayah3}.mp3`;
            }
        },
        dosari: {
            name: "Yasser Al-Dosari",
            primary: (surah, ayah) => {
                const { surah3, ayah3 } = formatSurahAyah(surah, ayah);
                return `https://everyayah.com/data/Yasser_AlDosari_128kbps/${surah3}${ayah3}.mp3`;
            },
            fallback: (surah, ayah) => {
                const { surah3, ayah3 } = formatSurahAyah(surah, ayah);
                return `https://server7.mp3quran.net/yasser/${surah3}${ayah3}.mp3`;
            }
        }
    };
    
    let currentReciter = "alafasy";
    
    function getAudioElement() {
        if (!audioElement) {
            audioElement = new Audio();
            audioElement.preload = "auto";
            audioElement.addEventListener('ended', () => {
                audioIndex++;
                currentRetry = 0;
                if (audioIndex < audioQueue.length) {
                    playCurrentVerse();
                } else {
                    audioQueue = [];
                    audioIndex = 0;
                }
            });
            audioElement.addEventListener('error', (e) => {
                console.warn(`Audio error for verse ${audioQueue[audioIndex]?.surah}:${audioQueue[audioIndex]?.ayah}, source: ${audioElement.src}`);
                // Try next source
                if (currentRetry === 0) {
                    // Try fallback
                    currentRetry = 1;
                    const verse = audioQueue[audioIndex];
                    const reciter = RECITERS[currentReciter];
                    const fallbackUrl = reciter.fallback(verse.surah, verse.ayah);
                    console.log(`Attempting fallback: ${fallbackUrl}`);
                    audioElement.src = fallbackUrl;
                    audioElement.load();
                    audioElement.play().catch(err => {
                        console.warn("Fallback also failed, skipping verse");
                        audioIndex++;
                        currentRetry = 0;
                        if (audioIndex < audioQueue.length) {
                            playCurrentVerse();
                        } else {
                            audioQueue = [];
                            audioIndex = 0;
                        }
                    });
                } else {
                    // Both failed, skip verse
                    console.warn("Both primary and fallback failed, skipping verse");
                    audioIndex++;
                    currentRetry = 0;
                    if (audioIndex < audioQueue.length) {
                        playCurrentVerse();
                    } else {
                        audioQueue = [];
                        audioIndex = 0;
                    }
                }
            });
        }
        return audioElement;
    }
    
    function playCurrentVerse() {
        if (audioIndex >= audioQueue.length) return;
        const verse = audioQueue[audioIndex];
        const reciter = RECITERS[currentReciter];
        const primaryUrl = reciter.primary(verse.surah, verse.ayah);
        const audio = getAudioElement();
        
        console.log(`Playing verse ${verse.surah}:${verse.ayah} with ${reciter.name}`);
        console.log(`URL: ${primaryUrl}`);
        audio.src = primaryUrl;
        audio.load();
        audio.play().catch(err => {
            console.warn("Play failed, falling back to error handler", err);
            // The error event will handle fallback
        });
    }
    
    function startPlayback(verses) {
        if (audioElement) {
            audioElement.pause();
            audioElement.currentTime = 0;
        }
        if (!verses || verses.length === 0) return;
        audioQueue = [...verses];
        audioIndex = 0;
        currentRetry = 0;
        playCurrentVerse();
    }
    
    // -----------------------------------------------
    // MAIN: Read verses without blockchain
    // -----------------------------------------------
    async function onReadVerses() {
        const loading = document.getElementById("loadingMessage");
        const display = document.getElementById("versesDisplay");
        loading.style.display = "block";
        display.style.display = "none";
        
        await new Promise(resolve => setTimeout(resolve, 100));
        const triplet = getRandomConsecutiveTriplet();
        await displayTripletVerses(triplet);
        
        loading.style.display = "none";
        display.style.display = "block";
        display.scrollIntoView({ behavior: "smooth" });
    }
    
    // -----------------------------------------------
    // EVENT LISTENERS
    // -----------------------------------------------
    document.addEventListener("DOMContentLoaded", () => {
        const readBtn = document.getElementById("readVersesBtn");
        const listenBtn = document.getElementById("listenBtn");
        const reciterSelect = document.getElementById("reciterSelect");
        
        readBtn.addEventListener("click", onReadVerses);
        listenBtn.addEventListener("click", () => {
            if (window.currentDisplayedVerses && window.currentDisplayedVerses.length === 3) {
                startPlayback(window.currentDisplayedVerses);
            } else {
                alert("Please read 3 verses first by clicking 'Read 3 Verses'.");
            }
        });
        
        reciterSelect.addEventListener("change", (e) => {
            currentReciter = e.target.value;
            if (audioElement) {
                audioElement.pause();
                audioElement.currentTime = 0;
            }
            audioQueue = [];
            audioIndex = 0;
            currentRetry = 0;
        });
        
        // Load initial verses
        onReadVerses();
    });
</script>
</body>
</html>
